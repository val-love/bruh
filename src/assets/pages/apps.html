<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dominum Apps</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
  :root {
    --bg: #0b0a16;
    --accent: #7a5cff;
    --blue: #00bfff;
    --text: #e6e6ff;
    --surface: rgba(255, 255, 255, 0.05);
    --border: rgba(255, 255, 255, 0.1);
  }
  * { box-sizing: border-box; outline: none; }
  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Orbitron', sans-serif;
    margin: 0;
    padding: 2rem;
    overflow-x: hidden;
  }
  .controls-wrapper {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 2.5rem;
    padding: 20px;
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    animation: slideDown 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .control-input {
    padding: 12px 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.2);
    color: var(--text);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.95rem;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  .control-input:hover { border-color: rgba(255, 255, 255, 0.2); }
  .control-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(122, 92, 255, 0.3);
    background: rgba(0, 0, 0, 0.4);
  }
  #searchBar { flex: 1 1 250px; }
  #container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1.5rem;
  }
  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.9) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .zone-item {
    background: var(--surface);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    opacity: 0; 
    animation: popIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease, border-color 0.3s ease;
  }
  .zone-item:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 15px 30px rgba(122, 92, 255, 0.2);
    border-color: var(--accent);
    z-index: 2;
  }
  .img-wrapper {
    width: 100%;
    aspect-ratio: 1;
    overflow: hidden;
    background-color: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .zone-item img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  .zone-item:hover img { transform: scale(1.15); }
  .zone-item button {
    padding: 1rem 0.8rem;
    border: none;
    background: transparent;
    color: var(--text);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.3s ease;
  }
  .zone-item:hover button { color: var(--accent); }
</style>
</head>
<body>

<div class="controls-wrapper">
  <input type="text" id="searchBar" class="control-input" placeholder="Search apps...">
</div>

<div id="container"></div>

<script>
const container = document.getElementById('container');
const searchBar = document.getElementById('searchBar');

const apps = [
  { "title": "Soundcloud", "image": "https://cdn.jsdelivr.net/gh/Darkdragonzxs/dominum@main/assets/images/apps/soundcloud.png", "url": "https://open.spotify.com/" },
  { "title": "Invidious", "image": "https://cdn.jsdelivr.net/gh/Darkdragonzxs/dominum@main/assets/images/apps/invidious.png", "url": "https://www.inv.nadeko.net/" },
  { "title": "Temp mail", "image": "https://cdn.jsdelivr.net/gh/Darkdragonzxs/dominum@main/assets/images/apps/tempmail.png", "url": "https://temp-mail.io/" },
  { "title": "Roblox", "image": "https://cdn.jsdelivr.net/gh/Darkdragonzxs/Calc-Flood@main/pedos.png", "url": "https://easyfun.gg/embed/roblox.html" },
  { "title": "Reddit", "image": "https://www.logo.wine/a/logo/Reddit/Reddit-Logomark-White-Dark-Background-Logo.wine.svg", "url": "https://reddit.com/" },
  { "title": "Snapchat", "image": "https://cdn.jsdelivr.net/gh/Darkdragonzxs/dominum@main/assets/images/apps/snapchat.png", "url": "https://snapchat.com/" },
  { "title": "Instagram", "image": "https://raw.githubusercontent.com/Darkdragonzxs/dominum/refs/heads/main/assets/images/apps/instagram.png", "url": "https://instagram.com/" },
  { "title": "Disc0rd", "image": "https://cdn.jsdelivr.net/gh/Darkdragonzxs/dominum@main/assets/images/apps/discord.png", "url": "https://discord.com/" },
  { "title": "TikTok", "image": "https://cdn.jsdelivr.net/gh/Darkdragonzxs/dominum@main/assets/images/apps/tiktok.png", "url": "https://tiktok.com/" },
  { "title": "Twitch", "image": "https://cdn.jsdelivr.net/gh/Darkdragonzxs/dominum@main/assets/images/apps/twitch.png", "url": "https://twitch.tv/" },
  { "title": "VidSrc", "image": "https://cdn.jsdelivr.net/gh/Darkdragonzxs/dominum@main/assets/images/apps/vidsrc.png", "url": "https://vidsrcme.ru/" },
  { "title": "IMDb", "image": "https://cdn.jsdelivr.net/gh/Darkdragonzxs/dominum@main/assets/images/apps/imdb.jpeg", "url": "https://www.imdb.com/" },
  { "title": "Vortex Chat", "image": "https://cdn.jsdelivr.net/gh/Darkdragonzxs/dominum@main/assets/images/apps/vtx-chat.png", "url": "https://vtx.chat/embed/dominum" },
  { "title": "MovieSlay", "image": "https://cdn.jsdelivr.net/gh/Darkdragonzxs/dominum@main/assets/images/apps/movieslay.png", "url": "https://movieslay.com/" }
];

function displayApps(list) {
  container.innerHTML = '';
  if (list.length === 0) {
    container.innerHTML = '<div style="width:100%; text-align:center; padding: 2rem; color: var(--text); opacity: 0.7;">No apps found.</div>';
    return;
  }
  list.forEach((app, index) => {
    const item = document.createElement('div');
    item.className = 'zone-item';
    
    const delay = Math.min(index * 0.03, 1.5);
    item.style.animationDelay = `${delay}s`;

    const imgWrapper = document.createElement('div');
    imgWrapper.className = 'img-wrapper';

    const img = document.createElement('img');
    img.src = app.image;
    img.alt = app.title;

    const btn = document.createElement('button');
    btn.textContent = app.title;
    
    item.onclick = () => window.location.href = `/s/embed.html#${app.url}`;
    btn.onclick = (e) => { e.stopPropagation(); window.location.href = `/s/embed.html#${app.url}`; };

    imgWrapper.appendChild(img);
    item.appendChild(imgWrapper);
    item.appendChild(btn);
    container.appendChild(item);
  });
}

displayApps(apps);

searchBar.addEventListener('input', () => {
  const query = searchBar.value.toLowerCase();
  const filtered = apps.filter(app => app.title.toLowerCase().includes(query));
  displayApps(filtered);
});
</script>

<script>
const root = document.documentElement;
const themes = {
  default:{"--bg":"#0b0a16","--accent":"#7a5cff","--blue":"#00bfff","--text":"#e6e6ff","--surface":"rgba(255,255,255,0.05)","--border":"rgba(255,255,255,0.1)"},
  cyber:{"--bg":"#050c1b","--accent":"#39ff14","--blue":"#00ffff","--text":"#e0ffe0","--surface":"rgba(0,255,0,0.05)","--border":"rgba(0,255,0,0.1)"},
  sunset:{"--bg":"#1a0b0b","--accent":"#ff6f61","--blue":"#ffa500","--text":"#fff0e6","--surface":"rgba(255,110,100,0.05)","--border":"rgba(255,110,100,0.1)"},
  neon:{"--bg":"#0f0020","--accent":"#ff00ff","--blue":"#00ffff","--text":"#ffffff","--surface":"rgba(255,0,255,0.05)","--border":"rgba(255,0,255,0.1)"},
  darkred:{"--bg":"#1b0000","--accent":"#ff0000","--blue":"#cc0000","--text":"#ffe6e6","--surface":"rgba(255,0,0,0.05)","--border":"rgba(255,0,0,0.1)"},
  dnv2:{"--bg":"#050007","--accent":"#ff00de","--blue":"#00fff7","--text":"#ffffff","--surface":"rgba(255,0,255,0.05)","--border":"rgba(255,0,255,0.15)"},
  matrix:{"--bg":"#001100","--accent":"#00ff00","--blue":"#33ff33","--text":"#99ff99","--surface":"rgba(0,255,0,0.05)","--border":"rgba(0,255,0,0.15)"}
};

function applyTheme(theme){
  Object.entries(theme).forEach(([k,v])=>root.style.setProperty(k,v));
}

(function(){
  const name = localStorage.getItem("dominum-theme") || "default";
  if(name === "custom"){
    const custom = JSON.parse(localStorage.getItem("dominum-custom-theme") || "{}");
    applyTheme(custom);
  } else applyTheme(themes[name]);
})();
</script>
</body>
</html>
