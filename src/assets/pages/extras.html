<style>
  :root {
    --bg:#0b0a16;--accent:#7a5cff;--blue:#00bfff;--text:#e6e6ff;
    --surface:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1);--card-bg:rgba(255,255,255,0.03);
  }
  body {
    margin:0;padding:40px;background:var(--bg);color:var(--text);
    font-family:'Orbitron',sans-serif;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-start;height:100vh;overflow-y:auto;
    position:relative;z-index:1;
  }
  h1 {font-size:2.2em;margin-bottom:30px;text-transform:uppercase;color:var(--accent);}
  
  .extras-buttons {display:flex;gap:20px;flex-wrap:wrap;justify-content:center;z-index:2;}
  
  .extras-btn {
    background:var(--surface);border:2px solid var(--border);color:var(--text);
    padding:15px 30px;border-radius:10px;cursor:pointer;font-size:1em;
    text-transform:uppercase;letter-spacing:1px;transition:all .3s cubic-bezier(0.25, 0.8, 0.25, 1);
    position:relative;z-index:3;
  }
  
  .extras-btn:hover {
    background:var(--accent);
    color:#fff;
    transform:translateY(-4px);
    box-shadow: 0 8px 20px rgba(122, 92, 255, 0.4);
    border-color: var(--accent);
  }

  .modal {
    display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;
    background:rgba(10,10,20,.8);backdrop-filter:blur(8px);justify-content:center;align-items:center;
    opacity: 0; transition: opacity 0.3s ease;
  }
  
  .modal.active{display:flex; opacity: 1;}
  
  .modal-content {
    background:var(--card-bg);border:2px solid var(--border);border-radius:15px;
    padding:25px;width:80%;max-width:700px;max-height:80%;overflow-y:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);animation:slideUp .4s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index:1001;position:relative;
  }
  
  .modal-header {
    display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;
    border-bottom: 1px solid var(--border); padding-bottom: 10px;
  }
  
  .modal-header h2{color:var(--accent);font-size:1.5em; margin:0;}
  
  .close-btn{cursor:pointer;font-size:1.5em;color:var(--text);transition:color .3s ease, transform 0.2s ease;}
  .close-btn:hover{color:var(--accent); transform: scale(1.2);}
  
  .card {
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:15px;display:flex;align-items:flex-start;gap:15px;margin-bottom:15px;
    transition:transform .3s ease,border-color .3s ease, box-shadow .3s ease;cursor:pointer;
  }
  
  .card:hover{
    border-color:var(--accent);
    transform:translateY(-3px) scale(1.02);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  
  .card img{width:60px;height:60px;border-radius:50%;object-fit:cover; border: 2px solid transparent; transition: border-color 0.3s ease;}
  .card:hover img{border-color: var(--accent);}
  
  .card-content{flex:1;}
  .card h3{margin:0;font-size:1.1em;color:var(--accent); transition: color 0.3s ease;}
  .card p.role{font-size:.9em;color:var(--blue);margin-bottom:5px;}
  .card p.desc{font-size:.85em;color:var(--text);opacity:.9; line-height: 1.4;}
  
  .link-btns{display:flex;gap:15px;margin-top:20px;justify-content:center;}
  .link-btn{
    background:var(--surface);border:1px solid var(--accent);color:#fff;padding:10px 20px;border-radius:8px;
    cursor:pointer;font-family:'Orbitron',sans-serif;text-transform:uppercase;transition:all .3s ease;
  }
  .link-btn:hover{background:var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(122, 92, 255, 0.3);}
  
  @keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
  
  #particles-js {
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-1;
    pointer-events:none;
  }
  
  #vortex-links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  #vortex-links .card {
    text-align: center;
    cursor: pointer;
    justify-content: center;
  }
</style>

  function renderCredits() {
    const container = document.getElementById('credits-container');
    container.innerHTML = '';
    siteCredits.forEach(credit => {
      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = () => openProfile(credit.name, credit.role, credit.desc, credit.img);

          <p class="role">${credit.role}</p>

      `;
      container.appendChild(card);
    });
  }

  const themes = {
    default:{"--bg":"#0b0a16","--accent":"#7a5cff","--blue":"#00bfff","--text":"#e6e6ff","--surface":"rgba(255,255,255,0.05)","--border":"rgba(255,255,255,0.1)","--card-bg":"rgba(255,255,255,0.03)"},
    cyber:{"--bg":"#050c1b","--accent":"#39ff14","--blue":"#00ffff","--text":"#e0ffe0","--surface":"rgba(0,255,0,0.05)","--border":"rgba(0,255,0,0.1)","--card-bg":"rgba(0,255,0,0.03)"},
    sunset:{"--bg":"#1a0b0b","--accent":"#ff6f61","--blue":"#ffa500","--text":"#fff0e6","--surface":"rgba(255,110,100,0.05)","--border":"rgba(255,110,100,0.1)","--card-bg":"rgba(255,110,100,0.03)"},
    neon:{"--bg":"#0f0020","--accent":"#ff00ff","--blue":"#00ffff","--text":"#ffffff","--surface":"rgba(255,0,255,0.05)","--border":"rgba(255,0,255,0.1)","--card-bg":"rgba(255,0,255,0.03)"},
    darkred:{"--bg":"#1b0000","--accent":"#ff0000","--blue":"#cc0000","--text":"#ffe6e6","--surface":"rgba(255,0,0,0.05)","--border":"rgba(255,0,0,0.1)","--card-bg":"rgba(255,0,0,0.03)"},
    dnv2:{"--bg":"#050007","--accent":"#ff00de","--blue":"#00fff7","--text":"#ffffff","--surface":"rgba(255,0,255,0.05)","--border":"rgba(255,0,255,0.15)","--card-bg":"rgba(15,0,30,0.7)"},
    matrix:{"--bg": "#001100","--accent": "#00ff00","--blue": "#33ff33","--text": "#99ff99","--surface": "rgba(0, 255, 0, 0.05)","--border": "rgba(0, 255, 0, 0.15)","--card-bg": "rgba(0, 50, 0, 0.7)"}
  };

  function applyTheme(theme){
    Object.entries(theme).forEach(([v,k])=>root.style.setProperty(v,k));
    try {
      const frame = document.getElementById("content-frame");
      if(frame) Object.entries(theme).forEach(([v,k])=>frame.contentWindow.document.documentElement.style.setProperty(v,k));
    } catch(e){}
  }

  function loadTheme(){
    const name = localStorage.getItem("dominum-theme") || "default";
    if(name === "custom"){
      const t = JSON.parse(localStorage.getItem("dominum-custom-theme") || "{}");
      applyTheme(t);
    } else {
      applyTheme(themes[name] || themes['default']);
    }
  }

  try {
    const themeVars = window.parent.document.documentElement.style;
    for(let i=0; i<themeVars.length; i++){
      const p = themeVars[i];
      document.documentElement.style.setProperty(p, themeVars.getPropertyValue(p));
    }
  } catch(e){}

  loadTheme();

  function openEaglerLauncher() {
    const targetUrl = "src/assets/pages/ampler-launcher.html";
    const newTab = window.open("about:blank", "_blank");
    fetch(targetUrl)
      .then(response => response.text())
      .then(html => {
        newTab.document.open();
        newTab.document.write(html);
        newTab.document.close();
      })
      .catch(err => {
        console.error("Failed to load the launcher:", err);
        newTab.location.href = targetUrl; 
      });
  }

  function openGamePorts() {
    if (window.parent && window.parent.document.getElementById("content-frame")) {
      window.parent.document.getElementById("content-frame").src = "src/assets/pages/" + path;
    } else {
      window.location.href = path;
    }
  }

  function openDataGen() {
    const page = "data-generator.html";
    if (window.parent && window.parent.document.getElementById("content-frame")) {
      window.parent.document.getElementById("content-frame").src = "src/assets/pages/" + page;
    } else {
      window.location.href = page;
    }
  }
</script>
