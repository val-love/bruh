<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Dominum</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
  :root {
    --bg: #0b0a16;
    --accent: #7a5cff;
    --blue: #00bfff;
    --text: #e6e6ff;
    --surface: rgba(255, 255, 255, 0.05);
    --border: rgba(255, 255, 255, 0.1);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Orbitron', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  #particles-js {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }
  .container {
    z-index: 1;
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 60px 80px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    animation: floatIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  h1 {
    font-size: 7em;
    color: var(--accent);
    margin: 0;
    text-shadow: 0 0 30px rgba(122, 92, 255, 0.4);
    letter-spacing: 5px;
  }
  h2 {
    color: var(--text);
    font-size: 1.8em;
    margin-top: 5px;
    font-weight: 500;
  }
  p {
    margin-top: 15px;
    font-size: 1em;
    color: var(--text);
    opacity: 0.7;
    letter-spacing: 1px;
  }
  .buttons {
    margin-top: 40px;
    display: flex;
    gap: 20px;
    justify-content: center;
  }
  button {
    padding: 12px 28px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--accent);
    border-radius: 12px;
    color: var(--text);
    font-size: 1em;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  button:hover {
    background: var(--accent);
    color: var(--bg);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(122, 92, 255, 0.4);
  }
</style>
</head>
<body>
<div id="particles-js"></div>
<div class="container">
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>you aint a hacker little cro...</p>
  <p>if you were using the proxy, just press reload.</p>
  <div class="buttons">
    <button onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i> Reload</button>
    <button onclick="openHomePage()"><i class="fa-solid fa-house"></i> Return Home</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
(function() {
  const particlesEnabled = localStorage.getItem('dominum-particles') !== 'false';
  const particlesContainer = document.getElementById('particles-js');
  if (particlesEnabled) {
    particlesContainer.style.display = 'block';
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 60 },
        "color": { "value": ["#7a5cff", "#00bfff"] },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.5 },
        "size": { "value": 2 },
        "line_linked": { "enable": true, "distance": 130, "color": "#7a5cff", "opacity": 0.2, "width": 1 },
        "move": { "enable": true, "speed": 1.2, "direction": "none", "out_mode": "out" }
      },
      "interactivity": {
        "events": { "onhover": { "enable": true, "mode": "repulse" }, "onclick": { "enable": false } },
        "modes": { "repulse": { "distance": 100 } }
      },
      "retina_detect": true
    });
  } else {
    particlesContainer.style.display = 'none';
  }
})();
</script>
<script>
const root = document.documentElement;
const themes = {
  default:{"--bg":"#0b0a16","--accent":"#7a5cff","--blue":"#00bfff","--text":"#e6e6ff","--surface":"rgba(255,255,255,0.05)","--border":"rgba(255,255,255,0.1)"},
  cyber:{"--bg":"#050c1b","--accent":"#39ff14","--blue":"#00ffff","--text":"#e0ffe0","--surface":"rgba(0,255,0,0.05)","--border":"rgba(0,255,0,0.1)"},
  sunset:{"--bg":"#1a0b0b","--accent":"#ff6f61","--blue":"#ffa500","--text":"#fff0e6","--surface":"rgba(255,110,100,0.05)","--border":"rgba(255,110,100,0.1)"},
  neon:{"--bg":"#0f0020","--accent":"#ff00ff","--blue":"#00ffff","--text":"#ffffff","--surface":"rgba(255,0,255,0.05)","--border":"rgba(255,0,255,0.1)"},
  darkred:{"--bg":"#1b0000","--accent":"#ff0000","--blue":"#cc0000","--text":"#ffe6e6","--surface":"rgba(255,0,0,0.05)","--border":"rgba(255,0,0,0.1)"},
  dnv2:{"--bg":"#050007","--accent":"#ff00de","--blue":"#00fff7","--text":"#ffffff","--surface":"rgba(255,0,255,0.05)","--border":"rgba(255,0,255,0.15)"},
  matrix:{"--bg":"#001100","--accent":"#00ff00","--blue":"#33ff33","--text":"#99ff99","--surface":"rgba(0,255,0,0.05)","--border":"rgba(0,255,0,0.15)"}
};
function applyTheme(theme){
  Object.entries(theme).forEach(([k,v])=>root.style.setProperty(k,v));
}
(function(){
  const name = localStorage.getItem("dominum-theme") || "default";
  if(name === "custom"){
    const custom = JSON.parse(localStorage.getItem("dominum-custom-theme") || "{}");
    applyTheme(custom);
  } else applyTheme(themes[name]);
})();
function openHomePage() {
  if (window.parent && window.parent.document.getElementById("content-frame")) {
    window.parent.document.getElementById("content-frame").src = "src/assets/pages/home.html";
  } else {
    window.location.href = ".src/assets/pages/home.html";
  }
}
</script>
</body>
</html>
